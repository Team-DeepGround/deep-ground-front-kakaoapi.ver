name: Deploy React Frontend

on:
  push:
    branches: [ "develop" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Docker Login
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Restore .env.local
        run: |
          echo "${{ secrets.NEXTJS_ENV_LOCAL }}" | base64 -d > .env.local

      - name: Build and Push React Image
        run: |
          docker build -t react-frontend .
          docker tag react-frontend ${{ secrets.DOCKER_USERNAME }}/react-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/react-frontend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop react-frontend || true
            docker rm react-frontend || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/react-frontend:latest
            docker run -d -p 80:3000 --name react-frontend ${{ secrets.DOCKER_USERNAME }}/react-frontend:latest
